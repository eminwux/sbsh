name: Release Build
on:
  push:
    tags:
      - "v[0-9].[0-9]+.[0-9]+"

jobs:
  sbsh_binaries:
    name: Create Release
    env:
      SBSH_VERSION: ${{ github.ref_name }}
      SBSH_REGISTRY: ghcr.io
      SBSH_IMAGE_NAME: ${{ github.repository_owner }}/sbsh
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Build artifacts
        run: make release-build SBSH_VERSION=$SBSH_VERSION

      - name: Create Github Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
          ./sbsh-linux-amd64 ./sbsh-linux-arm64 \
          ./sbsh-darwin-amd64 ./sbsh-darwin-arm64 \
          ./sbsh-freebsd-amd64 ./sbsh-freebsd-arm64 \
          --title "${GITHUB_REF#refs/tags/}" \
          --generate-notes \
          --notes "Container images (multi-arch: linux/amd64, linux/arm64):
          - ${SBSH_REGISTRY}/${SBSH_IMAGE_NAME}:${SBSH_VERSION}
          - ${SBSH_REGISTRY}/${SBSH_IMAGE_NAME}:latest
          "

  sbsh_images:
    name: Build Images
    env:
      SBSH_VERSION: ${{ github.ref_name }}
      SBSH_REGISTRY: ghcr.io
      SBSH_IMAGE_NAME: ${{ github.repository_owner }}/sbsh
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SBSH_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract sbsh metadata
        id: meta-sbsh
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SBSH_REGISTRY }}/${{ env.SBSH_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=sbsh
            org.opencontainers.image.version=${{ env.SBSH_VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push sbsh Docker image
        id: push-sbsh
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-sbsh.outputs.tags }}
          labels: ${{ steps.meta-sbsh.outputs.labels }}
          build-args: |
            VERSION=${{ env.SBSH_VERSION }}
          platforms: linux/amd64,linux/arm64

      - name: Generate sbsh artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.SBSH_REGISTRY }}/${{ env.SBSH_IMAGE_NAME }}
          subject-digest: ${{ steps.push-sbsh.outputs.digest }}
          push-to-registry: true
